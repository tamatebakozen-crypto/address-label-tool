<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宛名ラベル印刷ツール</title>
<style>
  /* ===== 基本スタイル ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Yu Gothic', 'Meiryo', sans-serif; background: #f5f5f5; color: #333; }

  .app { max-width: 1100px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 1.5rem; color: #2c3e50; }

  /* ===== レイアウト：左フォーム、右グリッド ===== */
  .main-layout { display: flex; gap: 24px; align-items: flex-start; }
  .left-panel { flex: 0 0 360px; }
  .right-panel { flex: 1; min-width: 0; }

  /* ===== フォーム ===== */
  .form-section { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 16px; }
  .form-section h2 { font-size: 1rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #3498db; color: #2c3e50; }

  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 3px; color: #555; }
  .form-group input, .form-group select {
    width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }

  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  /* ===== ボタン ===== */
  .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: background 0.2s; }
  .btn-primary { background: #3498db; color: #fff; }
  .btn-primary:hover { background: #2980b9; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-success:hover { background: #219a52; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-outline { background: #fff; color: #555; border: 1px solid #ccc; }
  .btn-outline:hover { background: #f0f0f0; }
  .btn-print { background: #8e44ad; color: #fff; font-size: 1rem; padding: 10px 24px; }
  .btn-print:hover { background: #7d3c98; }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

  /* ===== グリッド（ラベル位置選択） ===== */
  .grid-section { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .grid-section h2 { font-size: 1rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #27ae60; color: #2c3e50; }
  .grid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .grid-header h2 { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  .label-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    background: #ddd;
    border: 2px solid #ddd;
    border-radius: 4px;
  }
  .label-cell {
    background: #fff;
    aspect-ratio: 66 / 33.9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    padding: 4px;
    font-size: 0.55rem;
    line-height: 1.3;
    text-align: center;
    color: #aaa;
    transition: all 0.15s;
    overflow: hidden;
    position: relative;
    user-select: none;
  }
  .label-cell:hover { background: #f0f8ff; }
  .label-cell.selected { background: #eaf6ff; border: 2px solid #3498db; color: #333; }
  .label-cell .cell-number { position: absolute; top: 2px; left: 4px; font-size: 0.5rem; color: #bbb; }
  .label-cell.selected .cell-number { color: #3498db; }
  .label-cell .preview-text { font-size: 0.5rem; line-height: 1.2; word-break: break-all; }

  .print-actions { text-align: center; margin-top: 16px; }

  /* ===== テンプレート ===== */
  .template-section { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 16px; }
  .template-section h2 { font-size: 1rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e67e22; color: #2c3e50; }
  .template-save-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .template-save-row input { flex: 1; }
  .template-list { max-height: 200px; overflow-y: auto; }
  .template-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border: 1px solid #eee; border-radius: 4px; margin-bottom: 4px;
    font-size: 0.85rem; cursor: pointer; transition: background 0.15s;
  }
  .template-item:hover { background: #fef9f3; }
  .template-item .tpl-name { flex: 1; }
  .template-item .tpl-preview { color: #888; font-size: 0.75rem; margin: 0 8px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .template-item .tpl-delete { color: #e74c3c; cursor: pointer; font-size: 0.8rem; padding: 2px 6px; border-radius: 3px; }
  .template-item .tpl-delete:hover { background: #fde8e6; }
  .no-templates { color: #aaa; font-size: 0.85rem; text-align: center; padding: 12px; }

  /* ===== 印刷用スタイル ===== */
  @media print {
    @page {
      size: A4;
      margin: 0;
    }
    body { background: #fff; }
    .no-print { display: none !important; }
    .print-sheet {
      display: block !important;
      width: 210mm;
      height: 297mm;
      position: relative;
      page-break-after: always;
    }
    .print-label {
      position: absolute;
      width: 66mm;
      height: 33.9mm;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2mm 3mm;
      font-size: 9pt;
      line-height: 1.4;
    }
    .print-label .p-zip { font-size: 8pt; margin-bottom: 0.5mm; }
    .print-label .p-company { font-size: 7.5pt; }
    .print-label .p-dept { font-size: 7.5pt; }
    .print-label .p-addr { font-size: 8pt; }
    .print-label .p-name { font-size: 10.5pt; font-weight: bold; margin-top: 1mm; }
  }
  .print-sheet { display: none; }
</style>
</head>
<body>

<div class="app no-print">
  <h1>宛名ラベル印刷ツール</h1>
  <div class="main-layout">

    <!-- 左パネル：入力フォーム + テンプレート -->
    <div class="left-panel">
      <div class="form-section">
        <h2>宛先情報</h2>
        <div class="form-group">
          <label>郵便番号</label>
          <input type="text" id="zip" placeholder="例：123-4567">
        </div>
        <div class="form-group">
          <label>住所1（都道府県・市区町村）</label>
          <input type="text" id="addr1" placeholder="例：東京都千代田区丸の内1-1-1">
        </div>
        <div class="form-group">
          <label>住所2（建物名等）</label>
          <input type="text" id="addr2" placeholder="例：○○ビル 3階">
        </div>
        <div class="form-group">
          <label>会社名</label>
          <input type="text" id="company" placeholder="例：株式会社○○">
        </div>
        <div class="form-group">
          <label>部署名</label>
          <input type="text" id="dept" placeholder="例：営業部">
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label>宛名</label>
            <input type="text" id="name" placeholder="例：山田 太郎">
          </div>
          <div class="form-group" style="flex:1">
            <label>敬称</label>
            <select id="honorific">
              <option value="様">様</option>
              <option value="御中">御中</option>
              <option value="殿">殿</option>
              <option value="">なし</option>
            </select>
          </div>
        </div>
      </div>

      <!-- テンプレート -->
      <div class="template-section">
        <h2>テンプレート</h2>
        <div class="template-save-row">
          <input type="text" id="tplName" placeholder="テンプレート名">
          <button class="btn btn-success" onclick="saveTemplate()">保存</button>
        </div>
        <div class="template-list" id="tplList">
          <div class="no-templates">保存済みテンプレートなし</div>
        </div>
      </div>
    </div>

    <!-- 右パネル：グリッド -->
    <div class="right-panel">
      <div class="grid-section">
        <div class="grid-header">
          <h2>ラベル位置選択（A-ONE 24面）</h2>
          <div class="btn-group" style="margin-bottom:0">
            <button class="btn btn-outline" onclick="selectAll()">全選択</button>
            <button class="btn btn-outline" onclick="deselectAll()">全解除</button>
          </div>
        </div>
        <div class="label-grid" id="labelGrid"></div>
        <div class="print-actions">
          <button class="btn btn-print" onclick="printLabels()">印刷</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 印刷用シート -->
<div class="print-sheet" id="printSheet"></div>

<script>
  // ===== 状態管理 =====
  const selectedCells = new Set();
  const STORAGE_KEY = 'label_templates';

  // ===== A-ONE 24面レイアウト定数（mm） =====
  const LAYOUT = {
    cols: 3,
    rows: 8,
    labelW: 66,
    labelH: 33.9,
    marginTop: 8.8,
    marginLeft: 6,
    gapX: 0,
    gapY: 0
  };

  // ===== グリッド初期化 =====
  function initGrid() {
    const grid = document.getElementById('labelGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 24; i++) {
      const cell = document.createElement('div');
      cell.className = 'label-cell';
      cell.dataset.index = i;
      cell.innerHTML = `<span class="cell-number">${i + 1}</span><span class="preview-text"></span>`;
      cell.addEventListener('click', () => toggleCell(i));
      grid.appendChild(cell);
    }
  }

  function toggleCell(index) {
    if (selectedCells.has(index)) {
      selectedCells.delete(index);
    } else {
      selectedCells.add(index);
    }
    updateGrid();
  }

  function selectAll() {
    for (let i = 0; i < 24; i++) selectedCells.add(i);
    updateGrid();
  }

  function deselectAll() {
    selectedCells.clear();
    updateGrid();
  }

  function updateGrid() {
    const cells = document.querySelectorAll('.label-cell');
    const data = getFormData();
    cells.forEach((cell, i) => {
      const preview = cell.querySelector('.preview-text');
      if (selectedCells.has(i)) {
        cell.classList.add('selected');
        preview.textContent = buildPreviewText(data);
      } else {
        cell.classList.remove('selected');
        preview.textContent = '';
      }
    });
  }

  // ===== フォームデータ取得 =====
  function getFormData() {
    return {
      zip: document.getElementById('zip').value.trim(),
      addr1: document.getElementById('addr1').value.trim(),
      addr2: document.getElementById('addr2').value.trim(),
      company: document.getElementById('company').value.trim(),
      dept: document.getElementById('dept').value.trim(),
      name: document.getElementById('name').value.trim(),
      honorific: document.getElementById('honorific').value
    };
  }

  function setFormData(data) {
    document.getElementById('zip').value = data.zip || '';
    document.getElementById('addr1').value = data.addr1 || '';
    document.getElementById('addr2').value = data.addr2 || '';
    document.getElementById('company').value = data.company || '';
    document.getElementById('dept').value = data.dept || '';
    document.getElementById('name').value = data.name || '';
    document.getElementById('honorific').value = data.honorific || '様';
    updateGrid();
  }

  function buildPreviewText(d) {
    const parts = [];
    if (d.zip) parts.push('〒' + d.zip);
    if (d.addr1) parts.push(d.addr1);
    if (d.company) parts.push(d.company);
    if (d.name) parts.push(d.name + (d.honorific ? ' ' + d.honorific : ''));
    return parts.join(' / ');
  }

  // ===== 印刷 =====
  function printLabels() {
    if (selectedCells.size === 0) {
      alert('印刷するラベル位置を選択してください。');
      return;
    }
    const data = getFormData();
    if (!data.name && !data.company) {
      alert('宛名または会社名を入力してください。');
      return;
    }

    const sheet = document.getElementById('printSheet');
    sheet.innerHTML = '';

    selectedCells.forEach(index => {
      const row = Math.floor(index / LAYOUT.cols);
      const col = index % LAYOUT.cols;

      const left = LAYOUT.marginLeft + col * (LAYOUT.labelW + LAYOUT.gapX);
      const top = LAYOUT.marginTop + row * (LAYOUT.labelH + LAYOUT.gapY);

      const label = document.createElement('div');
      label.className = 'print-label';
      label.style.left = left + 'mm';
      label.style.top = top + 'mm';

      let html = '';
      if (data.zip) html += `<div class="p-zip">〒${data.zip}</div>`;
      if (data.addr1) html += `<div class="p-addr">${escapeHtml(data.addr1)}</div>`;
      if (data.addr2) html += `<div class="p-addr">${escapeHtml(data.addr2)}</div>`;
      if (data.company) html += `<div class="p-company">${escapeHtml(data.company)}</div>`;
      if (data.dept) html += `<div class="p-dept">${escapeHtml(data.dept)}</div>`;
      if (data.name) {
        const nameStr = escapeHtml(data.name) + (data.honorific ? ' ' + escapeHtml(data.honorific) : '');
        html += `<div class="p-name">${nameStr}</div>`;
      }

      label.innerHTML = html;
      sheet.appendChild(label);
    });

    window.print();
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ===== テンプレート管理 =====
  function getTemplates() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch { return []; }
  }

  function saveTemplates(templates) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(templates));
  }

  function saveTemplate() {
    const nameInput = document.getElementById('tplName');
    const tplName = nameInput.value.trim();
    if (!tplName) {
      alert('テンプレート名を入力してください。');
      return;
    }
    const templates = getTemplates();
    const existing = templates.findIndex(t => t.name === tplName);
    const entry = { name: tplName, data: getFormData() };

    if (existing >= 0) {
      if (confirm(`「${tplName}」を上書きしますか？`)) {
        templates[existing] = entry;
      } else {
        return;
      }
    } else {
      templates.push(entry);
    }

    saveTemplates(templates);
    nameInput.value = '';
    renderTemplates();
  }

  function loadTemplate(index) {
    const templates = getTemplates();
    if (templates[index]) {
      setFormData(templates[index].data);
    }
  }

  function deleteTemplate(index, event) {
    event.stopPropagation();
    const templates = getTemplates();
    if (confirm(`「${templates[index].name}」を削除しますか？`)) {
      templates.splice(index, 1);
      saveTemplates(templates);
      renderTemplates();
    }
  }

  function renderTemplates() {
    const list = document.getElementById('tplList');
    const templates = getTemplates();
    if (templates.length === 0) {
      list.innerHTML = '<div class="no-templates">保存済みテンプレートなし</div>';
      return;
    }
    list.innerHTML = templates.map((t, i) => {
      const preview = t.data.company ? t.data.company + ' ' : '';
      const namePreview = t.data.name ? t.data.name : '';
      return `<div class="template-item" onclick="loadTemplate(${i})">
        <span class="tpl-name">${escapeHtml(t.name)}</span>
        <span class="tpl-preview">${escapeHtml(preview + namePreview)}</span>
        <span class="tpl-delete" onclick="deleteTemplate(${i}, event)">削除</span>
      </div>`;
    }).join('');
  }

  // ===== フォーム入力のリアルタイム反映 =====
  document.querySelectorAll('#zip, #addr1, #addr2, #company, #dept, #name, #honorific').forEach(el => {
    el.addEventListener('input', updateGrid);
    el.addEventListener('change', updateGrid);
  });

  // ===== 初期化 =====
  initGrid();
  renderTemplates();
</script>
</body>
</html>
